<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hookG" x1="0.5" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#0FAAB6"/>
      <stop offset="100%" stop-color="#DE9C36"/>
    </linearGradient>
    <linearGradient id="tetherG" x1="0.5" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#0FAAB6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0FAAB6" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="podGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FDBF55" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#DE9C36" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <!-- Ship hull -->
  <path d="M256 60 L230 130 L242 122 L242 148 L270 148 L270 122 L282 130 Z" fill="#0FAAB6"/>
  <!-- Cockpit -->
  <ellipse cx="256" cy="95" rx="7" ry="9" fill="#0D8A94"/>
  <ellipse cx="256" cy="93" rx="5" ry="6" fill="#0FAAB6" opacity="0.5"/>
  <!-- Struts -->
  <rect x="236" y="148" width="40" height="7" rx="3" fill="#0FAAB6" opacity="0.5"/>
  <!-- Flame -->
  <path d="M245 155 L256 190 L267 155" fill="#DE9C36" opacity="0.8"/>
  <path d="M249 155 L256 180 L263 155" fill="#FDBF55" opacity="0.6"/>

  <!-- Tether -->
  <path d="M256 190 Q260 240 254 290 Q252 330 256 360"
        fill="none" stroke="url(#tetherG)" stroke-width="3.5"
        stroke-linecap="round" stroke-dasharray="8 5"/>

  <!-- J-Hook (no top-left serif, just stem + curve) -->
  <path d="M244 360 L268 360 L268 410
           Q268 460 240 478
           Q218 492 192 486
           Q166 480 156 458
           Q148 438 156 418
           L184 418
           Q178 438 192 454
           Q208 466 226 450
           Q238 440 238 420
           L238 360 Z"
        fill="url(#hookG)"/>

  <!-- Ball/Pod IN the curve — geborgen -->
  <circle cx="196" cy="450" r="14" fill="url(#podGlow)"/>
  <circle cx="196" cy="450" r="7" fill="#FDBF55" opacity="0.45"/>
</svg>
